<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Болашак AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f4f0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
#setup{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
#setup h2{color:#1a3d2e;margin-bottom:8px;font-size:20px}
#setup p{color:#666;font-size:14px;margin-bottom:24px;line-height:1.5}
#setup input{width:100%;border:1px solid #c5d9c8;border-radius:10px;padding:12px;font-size:14px;outline:none;margin-bottom:12px}
#setup input:focus{border-color:#2d6a4a}
#setup button{width:100%;background:#1a3d2e;color:#e1f5ee;border:none;border-radius:10px;padding:12px;font-size:15px;cursor:pointer;font-weight:600}
#setup button:hover{background:#2d6a4a}
#app{display:none;width:100%;max-width:680px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);flex-direction:column;height:90vh;max-height:700px}
#hdr{background:#1a3d2e;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hav{width:38px;height:38px;border-radius:50%;background:#2d6a4a;display:flex;align-items:center;justify-content:center;font-size:20px}
.hnm{color:#e1f5ee;font-size:15px;font-weight:600}
.hst{color:#5dcaa5;font-size:12px;display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#5dcaa5;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#quick{padding:10px 14px;border-bottom:1px solid #e8ede9;display:flex;gap:7px;flex-wrap:wrap;background:#f7faf7;flex-shrink:0}
.qb{font-size:12px;padding:5px 11px;border:1px solid #c5d9c8;border-radius:20px;background:#fff;color:#2d5a3d;cursor:pointer;white-space:nowrap}
.qb:hover{background:#e1f5ee}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;animation:fi .2s ease}
.msg.user{flex-direction:row-reverse}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.mav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.msg.bot .mav{background:#1a3d2e;color:#5dcaa5}
.msg.user .mav{background:#e1f0ff;color:#1a5fc8}
.mbub{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55}
.msg.bot .mbub{background:#f4f7f4;color:#1a2e1e;border-radius:4px 14px 14px 14px}
.msg.user .mbub{background:#1a3d2e;color:#e1f5ee;border-radius:14px 4px 14px 14px}
.typing{display:flex;align-items:center;gap:5px;padding:10px 14px;background:#f4f7f4;border-radius:4px 14px 14px 14px}
.typing span{width:7px;height:7px;border-radius:50%;background:#5dcaa5;animation:bc 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#ia{padding:12px 14px;border-top:1px solid #e8ede9;display:flex;gap:8px;background:#fff;flex-shrink:0}
#txt{flex:1;border:1px solid #c5d9c8;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;background:#f7faf7;color:#1a2e1e;resize:none;outline:none;min-height:42px;max-height:100px}
#txt:focus{border-color:#2d6a4a}
#btn{width:42px;height:42px;border-radius:10px;background:#1a3d2e;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#btn:hover{background:#2d6a4a}
#btn svg{width:18px;height:18px;fill:#5dcaa5}
#btn:disabled{opacity:.5}
</style>
</head>
<body>
<div id="setup">
  <h2>🤖 Болашак AI</h2>
  <p>Введите ваше имя для входа</p>
  <input id="nameinput" type="text" placeholder="Ваше имя (например: Айзада)" onkeydown="if(event.key==='Enter')start()"/>
  <button onclick="start()">Войти</button>
</div>
<div id="app">
<div id="hdr">
  <div class="hav">🤖</div>
  <div><div class="hnm">Болашак AI — Помощник директора</div>
  <div class="hst"><span class="dot"></span>Онлайн · BolashakGo</div></div>
</div>
<div id="quick">
  <button class="qb" onclick="qa('Сколько магазинов работает сейчас?')">🏪 Магазины</button>
  <button class="qb" onclick="qa('Какие процессы автоматизировать первыми?')">⚡ Автоматизация</button>
  <button class="qb" onclick="qa('Статус BolashakGo — что готово?')">📱 BolashakGo</button>
  <button class="qb" onclick="qa('Структура отделов компании')">🏢 Структура</button>
  <button class="qb" onclick="qa('IT стек и ограничения')">💻 IT</button>
</div>
<div id="msgs">
  <div class="msg bot"><div class="mav">🤖</div>
  <div class="mbub">Добрый день! Я AI-помощник сети <strong>Болашак</strong>.<br><br>Знаю всё о магазинах, BolashakGo и автоматизации. Задайте вопрос!</div></div>
</div>
<div id="ia">
  <textarea id="txt" placeholder="Написать сообщение..." rows="1" onkeydown="ok(event)" oninput="rs(this)"></textarea>
  <button id="btn" onclick="go()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
</div>
</div>
<script>
const SERVER = 'http://100.121.80.67:3001';
let USERNAME='', H=[], busy=false;

function start(){
  const n=document.getElementById('nameinput').value.trim();
  if(!n){alert('Введите ваше имя');return;}
  USERNAME=n;
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  loadHistory();
}

async function loadHistory(){
  try{
    const r=await fetch(`${SERVER}/history/${USERNAME}`);
    const data=await r.json();
    H=data;
    data.forEach(m=>{
      if(m.role==='user') add('user',fmt(m.content));
      else add('bot',fmt(m.content));
    });
  }catch(e){}
}

function rs(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,100)+'px'}
function ok(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}}
function qa(t){document.getElementById('txt').value=t;go()}
function add(r,h){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg '+(r==='user'?'user':'bot');
  const a=document.createElement('div');a.className='mav';a.textContent=r==='user'?USERNAME.slice(0,2).toUpperCase():'🤖';
  const b=document.createElement('div');b.className='mbub';b.innerHTML=h;
  d.appendChild(a);d.appendChild(b);w.appendChild(d);w.scrollTop=w.scrollHeight;
}
function showT(){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg bot';d.id='tp';
  const a=document.createElement('div');a.className='mav';a.textContent='🤖';
  const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';
  d.appendChild(a);d.appendChild(t);w.appendChild(d);w.scrollTop=w.scrollHeight;
}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}

async function go(){
  if(busy)return;
  const i=document.getElementById('txt');
  const t=i.value.trim();if(!t)return;
  i.value='';i.style.height='auto';busy=true;
  document.getElementById('btn').disabled=true;
  add('user',fmt(t));showT();
  try{
    const r=await fetch(`${SERVER}/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user:USERNAME, message:t})
    });
    const data=await r.json();
    document.getElementById('tp')?.remove();
    add('bot',fmt(data.reply));
  }catch(e){
    document.getElementById('tp')?.remove();
    add('bot','❌ Ошибка подключения к серверу.');
  }
  busy=false;document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
